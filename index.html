<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amorino</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container home-page">

    <div class="brand-banner">
      <img src="imagenes/banner_amorino.jpg" alt="Amorino Gelato al Naturale">
    </div>

    <section class="hero">
      <h1 class="hero-title" data-i18n-html="home.heroTitle">Todos nuestros conos<br>son una flor</h1>

      <div class="hero-image">
        <img src="imagenes/hero_flor.jpg" alt="Conos Amorino en forma de flor">
      </div>

      <p class="hero-subtitle" data-i18n="home.heroSubtitle">Puedes incluir todos los sabores que quieras</p>

      <div class="hero-highlight" data-i18n="home.heroHighlight">
        SABORES ILIMITADOS
      </div>
    </section>

    <section class="home-actions">
      <a class="home-main-button" href="como-funciona.html" data-i18n="home.howItWorks">Cómo funciona</a>

      <div class="home-grid-buttons">
        <a class="home-secondary-button" href="sabores.html" data-i18n="home.flavors">Sabores</a>
        <a class="home-secondary-button" href="otros-productos.html" data-i18n="home.otherProducts">Otros productos</a>
      </div>

    <div class="home-review-block">
  <div class="home-review-text">Tu opinión nos ayuda mucho</div>
  <a class="home-review-button" href="https://search.google.com/local/writereview?placeid=ChIJJZ5ITJq1Gg0RJYv1OtXW7WI" target="_blank" rel="noopener noreferrer">
    <span class="home-review-label">
      Valóranos en
      <span class="google-word" aria-label="Google">
        <span class="g-blue">G</span><span class="g-red">o</span><span class="g-yellow">o</span><span class="g-blue">g</span><span class="g-green">l</span><span class="g-red">e</span>
      </span>
    </span>
    <span class="home-review-stars">★★★★★</span>
  </a>
</div>
    </section>

  </div>

  <script src="script.js"></script>
</body>
</html>
